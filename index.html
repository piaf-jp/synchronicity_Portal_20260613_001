<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNCHRONICITY - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f6f8fa; }
        .serif-font { font-family: 'Cinzel', serif; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative">
    <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-gray-200/50 to-transparent -z-10 pointer-events-none"></div>

    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        const { useState } = React;

        const AppCard = ({ title, desc, url, icon, colorClass, status, warning }) => (
            <a href={url} className={`block bg-white rounded-2xl p-6 border border-gray-100 shadow-sm hover:shadow-lg transition-all duration-300 group relative overflow-hidden flex flex-col ${status === 'coming' ? 'pointer-events-none opacity-70' : ''}`}>
                <div className={`absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${colorClass} opacity-10 rounded-bl-full transition-transform group-hover:scale-110`}></div>
                
                <div className="relative z-10 flex flex-col h-full">
                    <div className="flex justify-between items-start mb-4">
                        <div className="text-3xl">{icon}</div>
                        {status === 'coming' ? (
                            <span className="text-[10px] font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-full">Coming Soon</span>
                        ) : (
                            <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-1 rounded-full">稼働中</span>
                        )}
                    </div>
                    
                    <h3 className="text-lg font-bold text-gray-900 mb-2">{title}</h3>
                    <p className="text-xs text-gray-500 leading-relaxed flex-1">{desc}</p>
                    
                    {/* ▼ 警告・注意書きコメントの表示エリア ▼ */}
                    {warning && (
                        <div className="mt-3 text-[10px] font-bold text-rose-500 bg-rose-50 px-2 py-1.5 rounded-lg border border-rose-100 inline-flex items-center gap-1 w-fit">
                            ⚠️ {warning}
                        </div>
                    )}
                    
                    {status !== 'coming' && (
                        <div className="mt-4 pt-4 border-t border-gray-50 flex items-center justify-end text-xs font-bold text-gray-400 group-hover:text-gray-900 transition-colors">
                            {title.includes('Study & Quiz') ? '学習を始める →' : '鑑定を始める →'}
                        </div>
                    )}
                </div>
            </a>
        );

        function App() {
            // Tarot Study & Quiz を Oracle of Tarot のすぐ下に移動しました
            const apps = [
                {
                    title: "SYNCHRONICITY 深層心理テスト",
                    desc: "5つの極限テーマ（強度・カルマ・フェティシズム・サイコパス・悪人度）から、あなたの心の奥底に潜む本性を暴き出す心理テスト。",
                    url: "https://piaf-jp.github.io/synchronicity_shinsoushinri_20260614_001/",
                    icon: "👁️",
                    colorClass: "from-pink-400 to-rose-600",
                    status: "active"
                },
                {
                    title: "Oracle of Tarot",
                    desc: "フルデッキ78枚と多彩なスプレッドで、過去・現在・未来の隠されたメッセージを導き出すタロット鑑定。",
                    url: "https://piaf-jp.github.io/Oracle_tarot_20260613_001/",
                    icon: "🃏",
                    colorClass: "from-indigo-400 to-purple-600",
                    status: "active"
                },
                {
                    title: "Tarot Study & Quiz",
                    desc: "大アルカナ・小アルカナ全78枚のカードが持つ意味や象徴を、クイズ形式で楽しく学べる専用の学習アプリ。",
                    url: "https://piaf-jp.github.io/tarot_quiz_20260621_001/",
                    icon: "📚",
                    colorClass: "from-blue-400 to-cyan-500",
                    status: "active"
                },
                {
                    title: "Ultimate Hand Reading",
                    desc: "両手の掌から先天的な宿命と後天的な運命をAIが極限まで深く読み解く手相鑑定。",
                    url: "https://piaf-jp.github.io/piaf-jp-palm-reading_2026061302_001/",
                    icon: "✋",
                    colorClass: "from-amber-400 to-yellow-600",
                    status: "active",
                    warning: "画像解析のためAPIリソース消費大"
                },
                {
                    title: "SYNCHRONICITY 総合診断",
                    desc: "姓名判断、血液型、九星気学、四柱推命を掛け合わせた究極の深層心理・相性鑑定。",
                    url: "https://piaf-jp.github.io/synchronicity_from_2026060702_001/",
                    icon: "🔮",
                    colorClass: "from-rose-400 to-orange-400",
                    status: "active",
                    warning: "基本情報のインプットに手間がかかります"
                }
            ];

            return (
                <div className="max-w-4xl mx-auto w-full px-4 py-12 md:py-20 fade-in pb-24">
                    <header className="text-center mb-16 space-y-4">
                        <div className="inline-flex items-center justify-center p-3 bg-white rounded-full shadow-sm border border-gray-100 mb-2">
                            <span className="text-2xl">🌌</span>
                        </div>
                        <h1 className="serif-font text-3xl md:text-5xl font-black tracking-widest text-gray-900">
                            SYNCHRONICITY
                        </h1>
                        <p className="text-sm font-bold text-gray-500 tracking-widest uppercase">
                            AI Fortune Telling Portal
                        </p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {apps.map((app, index) => (
                            <AppCard key={index} {...app} />
                        ))}
                    </div>

                    <footer className="mt-20 text-center text-xs text-gray-400 font-bold">
                        <p>&copy; {new Date().getFullYear()} SYNCHRONICITY Project. All paths lead to truth.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
